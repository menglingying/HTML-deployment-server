<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>橙心国际教育积分系统</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">

    <!-- 统一的 Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF7A00',
                        secondary: '#FFB347',
                        accent: '#FFD700',
                        light: '#FFF5EB',
                        dark: '#333333',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'swipe': 'swipe 1s ease-in-out',
                        'fade-in': 'fadeIn 0.5s ease-in-out',
                        'slide-in': 'slideIn 0.5s ease-in-out',
                    },
                    keyframes: {
                        swipe: {
                            '0%': { transform: 'translateX(-100%)' },
                            '50%': { transform: 'translateX(0)' },
                            '100%': { transform: 'translateX(100%)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideIn: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                    },
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .glass-effect {
                background: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
            }
            .card-shadow {
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            }
            .gradient-primary {
                background: linear-gradient(135deg, #FF7A00 0%, #FFB347 100%);
            }
            .gradient-secondary {
                background: linear-gradient(135deg, #FFB347 0%, #FFD700 100%);
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-sm sticky top-0 z-30">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div
                    class="w-10 h-10 rounded-full overflow-hidden border border-orange-100 bg-white flex items-center justify-center shrink-0">
                    <img src="./logo.png" alt="橙心国际教育 Logo" class="w-full h-full object-contain">
                </div>
                <h1 class="text-xl font-bold text-primary">橙心国际教育积分系统</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button id="toggleView"
                    class="px-4 py-2 bg-light text-primary rounded-lg hover:bg-primary hover:text-white transition-colors flex items-center">
                    <i class="fa fa-user-circle mr-2"></i>
                    <span id="viewText">管理员登录</span>
                </button>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main class="container mx-auto px-4 py-8">
        <!-- 前台界面 -->
        <section id="frontDeskView" class="max-w-4xl mx-auto">
            <!-- 欢迎区域 -->
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800 mb-2">欢迎使用积分系统</h2>
                <p class="text-gray-600">请刷卡查询学员积分或进行积分操作</p>
            </div>

            <!-- 刷卡区域 -->
            <div id="cardSwipeArea"
                class="text-center cursor-pointer transition-all duration-300 mb-8 max-w-[760px] mx-auto">
                <img src="./card-swipe.jpg" alt="积分系统刷卡区域示意图"
                    class="w-full mx-auto rounded-lg object-contain max-h-[320px] md:max-h-[420px]">
            </div>

            <!-- 学员信息区域 -->
            <div id="studentInfoArea" class="hidden">
                <!-- 学员基本信息 -->
                <div class="bg-white rounded-xl p-6 shadow-sm mb-6">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
                        <div class="flex items-center space-x-4 mb-4 md:mb-0">
                            <div
                                class="w-16 h-16 rounded-full bg-light flex items-center justify-center text-primary text-2xl font-bold">
                                <span id="studentInitial">--</span>
                            </div>
                            <div>
                                <h3 class="text-2xl font-bold text-gray-800 mb-1">
                                    <span id="studentName">--</span>
                                </h3>
                                <p class="text-gray-600">
                                    <i class="fa fa-phone mr-1"></i>
                                    <span id="studentPhone">--</span>
                                </p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-6">
                            <div class="text-center">
                                <p class="text-gray-500">剩余积分</p>
                                <p id="studentPoints" class="text-3xl font-bold text-primary">--</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 打卡控制 -->
                <div id="checkInControls" class="mb-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-semibold text-primary">打卡签到</h3>
                        <div class="flex space-x-3">
                            <button id="writeCardButton"
                                class="px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-opacity-90 transition-colors flex items-center">
                                <i class="fa fa-magnet mr-2"></i>
                                写入磁卡
                            </button>
                            <button id="checkInButton"
                                class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-opacity-90 transition-colors flex items-center">
                                <i class="fa fa-check-circle mr-2"></i>
                                立即打卡
                            </button>
                        </div>
                    </div>
                    <div id="checkInStatus" class="hidden">
                        <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                            <div class="flex items-center mb-2">
                                <i class="fa fa-spinner fa-spin text-green-600 mr-2"></i>
                                <span id="checkInMessage" class="font-medium text-green-800">处理中...</span>
                            </div>
                            <p id="checkInProgress" class="text-green-700 text-sm">正在初始化系统</p>
                        </div>
                    </div>
                </div>

                <!-- 积分奖励快捷操作 -->
                <div id="pointsQuickActions" class="mb-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-semibold text-primary">积分奖励</h3>
                        <div class="text-sm text-gray-500">点击下方按钮快速发放积分</div>
                    </div>

                    <!-- 积分原因快捷按钮 -->
                    <div id="quickEarnButtons" class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <!-- 按钮将通过JavaScript动态生成 -->
                        <div class="animate-pulse text-center py-4 text-gray-400">加载中...</div>
                    </div>
                </div>

                <!-- 积分兑换快捷操作 -->
                <div id="pointsRedeemActions" class="mb-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-semibold text-yellow-600">积分兑换</h3>
                        <div class="text-sm text-gray-500">点击下方按钮快速兑换积分</div>
                    </div>

                    <!-- 积分兑换快捷按钮 -->
                    <div id="quickUseButtons" class="grid grid-cols-2 md:grid-cols-3 gap-3">
                        <!-- 按钮将通过JavaScript动态生成 -->
                        <div class="animate-pulse text-center py-4 text-gray-400">加载中...</div>
                    </div>
                </div>

                <div class="h-px bg-gray-200 my-4"></div>
                <h3 class="text-lg font-semibold mb-4">积分记录</h3>

                <!-- 积分记录列表 -->
                <div id="transactionList" class="space-y-3 max-h-60 overflow-y-auto">
                    <div class="text-center text-gray-500 py-8">
                        <i class="fa fa-history text-4xl mb-2"></i>
                        <p>暂无积分记录</p>
                    </div>
                </div>

                <!-- 打卡记录 -->
                <div id="checkInRecords" class="mt-6 hidden">
                    <h3 class="text-lg font-semibold mb-4">打卡记录</h3>
                    <div id="checkInList" class="space-y-3 max-h-40 overflow-y-auto">
                        <!-- 打卡记录将通过JavaScript动态生成 -->
                    </div>
                </div>
            </div>
        </section>

        <!-- 管理员登录界面 -->
        <section id="adminLoginView" class="hidden max-w-md mx-auto">
            <div class="bg-white rounded-xl p-8 shadow-sm">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">管理员登录</h2>
                    <p class="text-gray-600">请输入管理员密码</p>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-700 mb-2">密码</label>
                        <input type="password" id="adminPassword"
                            class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                            placeholder="请输入管理员密码">
                    </div>
                    <button id="verifyPassword"
                        class="w-full py-3 bg-primary text-white rounded-lg hover:bg-opacity-90 transition-colors flex items-center justify-center">
                        <i class="fa fa-lock mr-2"></i>
                        验证
                    </button>
                </div>
            </div>
        </section>

        <!-- 管理员界面 -->
        <section id="adminView" class="hidden">
            <div class="bg-white rounded-xl p-6 shadow-sm">
                <!-- 管理员选项卡导航 -->
                <div class="border-b border-gray-200 mb-6">
                    <nav class="flex space-x-8">
                        <button class="admin-tab" data-tab="students"
                            class="px-1 py-3 border-b-2 border-primary text-primary font-medium">
                            <i class="fa fa-users mr-2"></i>学员管理
                        </button>
                        <button class="admin-tab" data-tab="earnPoints"
                            class="px-1 py-3 border-b-2 border-transparent text-gray-500 hover:text-primary hover:border-primary transition-colors">
                            <i class="fa fa-plus-circle mr-2"></i>积分发放
                        </button>
                        <button class="admin-tab" data-tab="usePoints"
                            class="px-1 py-3 border-b-2 border-transparent text-gray-500 hover:text-primary hover:border-primary transition-colors">
                            <i class="fa fa-minus-circle mr-2"></i>积分使用
                        </button>
                        <button class="admin-tab" data-tab="shortcuts"
                            class="px-1 py-3 border-b-2 border-transparent text-gray-500 hover:text-primary hover:border-primary transition-colors">
                            <i class="fa fa-list mr-2"></i>快捷选项管理
                        </button>
                    </nav>
                </div>

                <!-- 学员管理选项卡内容 -->
                <div id="studentsTab" class="admin-tab-content">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-semibold text-gray-800">学员管理</h3>
                        <button id="addStudentBtn"
                            class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-opacity-90 transition-colors flex items-center">
                            <i class="fa fa-plus mr-2"></i>
                            添加学员
                        </button>
                    </div>

                    <!-- 学员搜索 -->
                    <div class="mb-6">
                        <div class="relative">
                            <input type="text" id="studentSearch"
                                class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                                placeholder="搜索学员姓名或手机号">
                            <i
                                class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        </div>
                    </div>

                    <!-- 学员表格 -->
                    <div class="overflow-x-auto">
                        <table class="min-w-full bg-white">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        姓名</th>
                                    <th
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        手机号</th>
                                    <th
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        卡号</th>
                                    <th
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        积分</th>
                                    <th
                                        class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        操作</th>
                                </tr>
                            </thead>
                            <tbody id="studentsTableBody" class="bg-white divide-y divide-gray-200">
                                <!-- 学员数据将通过JavaScript动态填充 -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 积分发放选项卡内容 -->
                <div id="earnPointsTab" class="admin-tab-content hidden">
                    <h3 class="text-xl font-semibold text-gray-800 mb-6">积分发放</h3>
                    <div class="max-w-lg">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-gray-700 mb-2">选择学员</label>
                                <div class="relative mb-2">
                                    <input type="text" id="earnStudentSearch"
                                        class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                                        placeholder="输入姓名或手机号检索学员">
                                    <i
                                        class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                </div>
                                <select id="earnStudentSelect"
                                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                                    <option value="">请选择学员</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-gray-700 mb-2">积分数量</label>
                                <input type="number" id="earnPointsAmount" min="1"
                                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                                    placeholder="请输入积分数量">
                            </div>
                            <div>
                                <label class="block text-gray-700 mb-2">获得原因</label>
                                <div class="relative mb-2">
                                    <input type="text" id="earnReasonSearch"
                                        class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                                        placeholder="输入关键字检索获得原因">
                                    <i
                                        class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                </div>
                                <select id="earnPointsReason"
                                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                                    <option value="">请选择获得原因</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-gray-700 mb-2">日期</label>
                                <input type="date" id="earnPointsDate"
                                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                            <button id="earnPointsBtn"
                                class="w-full py-3 bg-green-600 text-white rounded-lg hover:bg-opacity-90 transition-colors flex items-center justify-center">
                                <i class="fa fa-plus-circle mr-2"></i>
                                发放积分
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 积分使用选项卡内容 -->
                <div id="usePointsTab" class="admin-tab-content hidden">
                    <h3 class="text-xl font-semibold text-gray-800 mb-6">积分使用</h3>
                    <div class="max-w-lg">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-gray-700 mb-2">选择学员</label>
                                <div class="relative mb-2">
                                    <input type="text" id="useStudentSearch"
                                        class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                                        placeholder="输入姓名或手机号检索学员">
                                    <i
                                        class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                </div>
                                <select id="useStudentSelect"
                                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                                    <option value="">请选择学员</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-gray-700 mb-2">积分数量</label>
                                <input type="number" id="usePointsAmount" min="1"
                                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                                    placeholder="请输入积分数量">
                            </div>
                            <div>
                                <label class="block text-gray-700 mb-2">使用原因</label>
                                <div class="relative mb-2">
                                    <input type="text" id="useReasonSearch"
                                        class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                                        placeholder="输入关键字检索使用原因">
                                    <i
                                        class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                </div>
                                <select id="usePointsReason"
                                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                                    <option value="">请选择使用原因</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-gray-700 mb-2">日期</label>
                                <input type="date" id="usePointsDate"
                                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                            <button id="usePointsBtn"
                                class="w-full py-3 bg-red-600 text-white rounded-lg hover:bg-opacity-90 transition-colors flex items-center justify-center">
                                <i class="fa fa-minus-circle mr-2"></i>
                                使用积分
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 快捷选项管理选项卡内容 -->
                <div id="shortcutsTab" class="admin-tab-content hidden">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- 积分获得原因选项 -->
                        <div class="bg-light p-6 rounded-lg">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-lg font-semibold text-primary">积分获得原因选项</h3>
                                <div class="flex space-x-2">
                                    <button id="editEarnReasonBtn"
                                        class="bg-blue-600 text-white px-3 py-1 rounded-md hover:bg-opacity-90 transition-colors text-sm flex items-center">
                                        <i class="fa fa-edit mr-1"></i>编辑
                                    </button>
                                    <button id="addEarnReasonBtn"
                                        class="bg-primary text-white px-3 py-1 rounded-md hover:bg-opacity-90 transition-colors text-sm flex items-center">
                                        <i class="fa fa-plus mr-1"></i>添加
                                    </button>
                                </div>
                            </div>
                            <div id="earnReasonsList" class="space-y-2 max-h-60 overflow-y-auto">
                                <!-- 快捷选项将通过JavaScript动态填充 -->
                            </div>
                            <div id="addEarnReasonForm" class="mt-4 hidden">
                                <div class="space-y-3">
                                    <div class="flex space-x-2">
                                        <input type="text" id="newEarnReason"
                                            class="flex-1 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary"
                                            placeholder="输入新的获得原因">
                                        <input type="number" id="newEarnPoints" min="-100" max="100" value="10"
                                            class="w-24 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary"
                                            placeholder="积分">
                                    </div>
                                    <div class="flex justify-end space-x-2">
                                        <button id="saveEarnReasonBtn"
                                            class="px-4 py-2 bg-primary text-white rounded-md hover:bg-opacity-90 transition-colors">保存</button>
                                        <button id="cancelEarnReasonBtn"
                                            class="px-4 py-2 bg-gray-200 rounded-md hover:bg-gray-300">取消</button>
                                    </div>
                                </div>
                            </div>

                            <!-- 编辑积分原因表单 -->
                            <div id="editEarnReasonForm" class="mt-4 hidden">
                                <div class="space-y-3">
                                    <div class="flex space-x-2">
                                        <input type="text" id="editEarnReason"
                                            class="flex-1 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary"
                                            placeholder="修改获得原因">
                                        <input type="number" id="editEarnPoints" min="-100" max="100" value="10"
                                            class="w-24 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary"
                                            placeholder="积分">
                                    </div>
                                    <div class="flex justify-end space-x-2">
                                        <button id="updateEarnReasonBtn"
                                            class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-opacity-90 transition-colors">更新</button>
                                        <button id="cancelEditEarnReasonBtn"
                                            class="px-4 py-2 bg-gray-200 rounded-md hover:bg-gray-300">取消</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 积分使用原因选项 -->
                        <div class="bg-light p-6 rounded-lg">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-lg font-semibold text-primary">积分使用原因选项</h3>
                                <div class="flex space-x-2">
                                    <button id="editUseReasonBtn"
                                        class="bg-blue-600 text-white px-3 py-1 rounded-md hover:bg-opacity-90 transition-colors text-sm flex items-center">
                                        <i class="fa fa-edit mr-1"></i>编辑
                                    </button>
                                    <button id="addUseReasonBtn"
                                        class="bg-primary text-white px-3 py-1 rounded-md hover:bg-opacity-90 transition-colors text-sm flex items-center">
                                        <i class="fa fa-plus mr-1"></i>添加
                                    </button>
                                </div>
                            </div>
                            <div id="useReasonsList" class="space-y-2 max-h-60 overflow-y-auto">
                                <!-- 快捷选项将通过JavaScript动态填充 -->
                            </div>
                            <div id="addUseReasonForm" class="mt-4 hidden">
                                <div class="space-y-3">
                                    <div class="flex space-x-2">
                                        <input type="text" id="newUseReason"
                                            class="flex-1 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary"
                                            placeholder="输入新的使用原因">
                                        <input type="number" id="newUsePoints" min="1" max="100" value="5"
                                            class="w-24 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary"

    <script>
        // 全局变量
        let pointsSystem;

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            pointsSystem = new PointsSystem();
        });

        // 积分系统主类
        class PointsSystem {
            constructor() {
                // 初始化数据
                this.students = [];
                this.transactions = [];
                this.shortcuts = this.createDefaultShortcuts();
                this.currentView = 'front'; // 'front' 或 'admin'
                this.currentAdminTab = 'students';
                this.loggedIn = false;
                this.adminPassword = 'admin123'; // 默认管理员密码
                this.currentStudentId = null;
                this.deleteStudentId = null;
                this.currentEditIndex = null;
                this.currentEditType = null;
                this.cardTags = {}; // 磁卡标签映射表
                this.checkInRecords = []; // 打卡记录
                this.writeCardSupported = false; // 是否支持写入磁卡
                this.apiBase = '/api';
                this.cloudVersion = 0;
                this.syncInProgress = false;
                this.syncPending = false;
                this.lastSyncErrorAt = 0;
                this.cloudSyncTimer = null;

                // 刷卡器相关属性
                this.cardReader = {
                    isReading: false,        // 是否正在读取卡号
                    cardData: '',            // 存储读取的卡号数据
                    startTime: 0,            // 开始读取时间
                    maxTime: 1000,           // 最大读取时间（毫秒）
                    minLength: 4,            // 卡号最小长度
                    prefix: '',              // 卡号前缀（根据实际刷卡器调整）
                    suffix: '',              // 卡号后缀（根据实际刷卡器调整）
                    readTimeout: 120,        // 字符流空闲判定（毫秒）
                    readTimer: null,         // 空闲判定定时器
                    endKeys: ['Enter', 'NumpadEnter', 'Tab'],
                    allowedChars: /^[0-9A-Za-z-]$/ // 允许字符（兼容数字/字母卡号）
                };

                this.initEventListeners();
                this.loadDataFromCloudBase();
                this.startCloudPolling();
                this.initCardReader();
                this.checkWriteCardSupport();
            }

            createDefaultShortcuts() {
                return {
                    earnReasons: [
                        { id: '1', name: '按时完成作业', points: 1 },
                        { id: '2', name: '按时完成作业', points: 2 },
                        { id: '3', name: '按时完成作业', points: 3 },
                        { id: '4', name: '上课积极表现', points: 1 },
                        { id: '5', name: '上课积极表现', points: 2 },
                        { id: '6', name: '上课积极表现', points: 3 },
                        { id: '7', name: '测试成绩表现', points: 1 },
                        { id: '8', name: '测试成绩表现', points: 2 },
                        { id: '9', name: '测试成绩表现', points: 3 },
                        { id: '10', name: '介绍同学上课', points: 10 },
                        { id: '11', name: '积分兑换', points: -50 },
                        { id: '12', name: '破坏公共设施', points: -10 },
                        { id: '13', name: '扰乱课堂纪律', points: -1 }
                    ],
                    useReasons: [
                        { id: '1', name: '换取小熊饼干', points: 5 },
                        { id: '2', name: '换取铅笔', points: 3 },
                        { id: '3', name: '换取笔记本', points: 8 },
                        { id: '4', name: '换取橡皮擦', points: 2 },
                        { id: '5', name: '换取小礼品', points: 15 },
                        { id: '6', name: '抵扣作业', points: 10 }
                    ]
                };
            }

            ensureShortcutDefaults() {
                const defaults = this.createDefaultShortcuts();

                if (!this.shortcuts || typeof this.shortcuts !== 'object') {
                    this.shortcuts = defaults;
                    return;
                }

                if (!Array.isArray(this.shortcuts.earnReasons) || this.shortcuts.earnReasons.length === 0) {
                    this.shortcuts.earnReasons = defaults.earnReasons;
                }

                if (!Array.isArray(this.shortcuts.useReasons) || this.shortcuts.useReasons.length === 0) {
                    this.shortcuts.useReasons = defaults.useReasons;
                }
            }

            // 初始化示例数据
            initSampleData() {
                // 创建示例学员
                const sampleStudents = [
                    {
                        id: this.generateId(),
                        name: '小明',
                        phone: '13800138001',
                        cardId: this.generateCardId(),
                        points: 100,
                        createdAt: new Date().toISOString()
                    },
                    {
                        id: this.generateId(),
                        name: '小红',
                        phone: '13800138002',
                        cardId: this.generateCardId(),
                        points: 75,
                        createdAt: new Date().toISOString()
                    },
                    {
                        id: this.generateId(),
                        name: '小华',
                        phone: '13800138003',
                        cardId: this.generateCardId(),
                        points: 120,
                        createdAt: new Date().toISOString()
                    }
                ];

                // 创建示例交易记录
                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);

                const lastWeek = new Date(today);
                lastWeek.setDate(lastWeek.getDate() - 7);

                const sampleTransactions = [
                    {
                        id: this.generateId(),
                        studentId: sampleStudents[0].id,
                        type: 'earn',
                        points: 10,
                        reason: '上课认真听讲',
                        date: lastWeek.toISOString()
                    },
                    {
                        id: this.generateId(),
                        studentId: sampleStudents[0].id,
                        type: 'use',
                        points: 10,
                        reason: '换取小熊饼干',
                        date: yesterday.toISOString()
                    },
                    {
                        id: this.generateId(),
                        studentId: sampleStudents[1].id,
                        type: 'earn',
                        points: 15,
                        reason: '完成作业优秀',
                        date: lastWeek.toISOString()
                    },
                    {
                        id: this.generateId(),
                        studentId: sampleStudents[2].id,
                        type: 'earn',
                        points: 20,
                        reason: '考试成绩优异',
                        date: yesterday.toISOString()
                    }
                ];

                // 保存到localStorage
                this.students = sampleStudents;
                this.transactions = sampleTransactions;

                // 保存到localStorage
                this.saveData();

                console.log('示例数据初始化成功');
                this.updateUI();
            }

            // 从云端加载数据，失败时回退本地缓存
            async loadDataFromCloudBase(showErrorNotification = true) {
                const hasLocalCache = this.loadLocalDataCache();

                try {
                    const response = await fetch(`${this.apiBase}/state`, { cache: 'no-store' });
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const payload = await response.json();
                    if (payload && payload.data) {
                        this.applyStateSnapshot(payload.data);
                        this.ensureShortcutDefaults();
                        this.cloudVersion = typeof payload.version === 'number' ? payload.version : 0;
                        this.saveLocalDataCache();
                        this.updateUI();
                        return;
                    }

                    if (!hasLocalCache) {
                        this.initSampleData();
                        return;
                    }

                    this.updateUI();
                } catch (error) {
                    console.error('云端加载失败，回退本地缓存:', error);

                    if (!hasLocalCache) {
                        this.initSampleData();
                        return;
                    }

                    this.updateUI();
                    if (showErrorNotification) {
                        this.showNotification('warning', '云端不可用', '当前使用本地缓存，网络恢复后会自动同步');
                    }
                }
            }

            getStateSnapshot() {
                return {
                    students: this.students,
                    transactions: this.transactions,
                    shortcuts: this.shortcuts,
                    cardTags: this.cardTags,
                    checkInRecords: this.checkInRecords
                };
            }

            applyStateSnapshot(snapshot) {
                if (!snapshot || typeof snapshot !== 'object') {
                    return;
                }

                this.students = Array.isArray(snapshot.students) ? snapshot.students : [];
                this.transactions = Array.isArray(snapshot.transactions) ? snapshot.transactions : [];

                if (
                    snapshot.shortcuts &&
                    Array.isArray(snapshot.shortcuts.earnReasons) &&
                    Array.isArray(snapshot.shortcuts.useReasons)
                ) {
                    this.shortcuts = snapshot.shortcuts;
                }

                this.cardTags = snapshot.cardTags && typeof snapshot.cardTags === 'object'
                    ? snapshot.cardTags
                    : {};
                this.checkInRecords = Array.isArray(snapshot.checkInRecords) ? snapshot.checkInRecords : [];
                this.ensureShortcutDefaults();
            }

            loadLocalDataCache() {
                try {
                    let hasAnyData = false;
                    const savedStudents = localStorage.getItem('orangeHeart_students');
                    const savedTransactions = localStorage.getItem('orangeHeart_transactions');
                    const savedShortcuts = localStorage.getItem('orangeHeart_shortcuts');
                    const savedCardTags = localStorage.getItem('orangeHeart_cardTags');
                    const savedCheckInRecords = localStorage.getItem('orangeHeart_checkInRecords');

                    if (savedStudents) {
                        this.students = JSON.parse(savedStudents);
                        hasAnyData = true;
                    }

                    if (savedTransactions) {
                        this.transactions = JSON.parse(savedTransactions);
                        hasAnyData = true;
                    }

                    if (savedShortcuts) {
                        this.shortcuts = JSON.parse(savedShortcuts);
                        hasAnyData = true;
                    }

                    if (savedCardTags) {
                        this.cardTags = JSON.parse(savedCardTags);
                        hasAnyData = true;
                    }

                    if (savedCheckInRecords) {
                        this.checkInRecords = JSON.parse(savedCheckInRecords);
                        hasAnyData = true;
                    }

                    this.ensureShortcutDefaults();
                    return hasAnyData;
                } catch (error) {
                    console.error('本地缓存读取失败:', error);
                    return false;
                }
            }

            saveLocalDataCache() {
                localStorage.setItem('orangeHeart_students', JSON.stringify(this.students));
                localStorage.setItem('orangeHeart_transactions', JSON.stringify(this.transactions));
                localStorage.setItem('orangeHeart_shortcuts', JSON.stringify(this.shortcuts));
                localStorage.setItem('orangeHeart_cardTags', JSON.stringify(this.cardTags));
                localStorage.setItem('orangeHeart_checkInRecords', JSON.stringify(this.checkInRecords));
            }

            startCloudPolling() {
                if (this.cloudSyncTimer) {
                    clearInterval(this.cloudSyncTimer);
                }

                this.cloudSyncTimer = setInterval(() => {
                    this.pullLatestCloudData();
                }, 8000);
            }

            async pullLatestCloudData() {
                if (this.syncInProgress) {
                    return;
                }

                try {
                    const response = await fetch(`${this.apiBase}/state`, { cache: 'no-store' });
                    if (!response.ok) {
                        return;
                    }

                    const payload = await response.json();
                    const latestVersion = typeof payload.version === 'number' ? payload.version : 0;

                    if (latestVersion > this.cloudVersion && payload.data) {
                        this.applyStateSnapshot(payload.data);
                        this.cloudVersion = latestVersion;
                        this.saveLocalDataCache();
                        this.updateUI();
                    }
                } catch (error) {
                    console.warn('拉取云端更新失败:', error);
                }
            }

            async syncDataToCloud() {
                if (this.syncInProgress) {
                    this.syncPending = true;
                    return;
                }

                this.syncInProgress = true;
                try {
                    const response = await fetch(`${this.apiBase}/state`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            baseVersion: this.cloudVersion,
                            data: this.getStateSnapshot()
                        })
                    });

                    if (response.status === 409) {
                        await this.loadDataFromCloudBase(false);
                        return;
                    }

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const payload = await response.json();
                    if (typeof payload.version === 'number') {
                        this.cloudVersion = payload.version;
                    }
                    this.lastSyncErrorAt = 0;
                } catch (error) {
                    console.error('云端同步失败:', error);

                    const now = Date.now();
                    if (now - this.lastSyncErrorAt > 30000) {
                        this.lastSyncErrorAt = now;
                        this.showNotification('warning', '同步延迟', '网络异常，数据已暂存本地，恢复后会继续同步');
                    }
                } finally {
                    this.syncInProgress = false;
                    if (this.syncPending) {
                        this.syncPending = false;
                        this.syncDataToCloud();
                    }
                }
            }

            // 检查磁卡写入支持
            checkWriteCardSupport() {
                // 检查WebUSB API支持
                if ('usb' in navigator) {
                    this.writeCardSupported = true;
                    console.log('检测到WebUSB支持，可以进行磁卡写入操作');
                } else {
                    console.log('当前浏览器不支持WebUSB API，将使用模拟写入模式');
                }
            }

            // 向磁卡写入数据
            async writeToCard(student, data) {
                if (!this.writeCardSupported) {
                    // 使用模拟写入模式
                    return this.simulateWriteToCard(student, data);
                }

                try {
                    // 尝试连接USB设备
                    const device = await navigator.usb.requestDevice({
                        filters: [{
                            classCode: 0xFF, // 厂商特定设备
                            subclassCode: 0x00,
                            protocolCode: 0x00
                        }]
                    });

                    await device.open();
                    await device.selectConfiguration(1);
                    await device.claimInterface(0);

                    // 准备写入数据
                    const cardData = this.prepareCardData(student, data);
                    const writeData = new TextEncoder().encode(cardData);

                    // 写入数据到设备
                    await device.transferOut(1, writeData);

                    // 关闭设备连接
                    await device.close();

                    console.log('磁卡写入成功:', cardData);
                    return { success: true, message: '磁卡写入成功' };
                } catch (error) {
                    console.error('磁卡写入失败:', error);
                    // 失败时回退到模拟模式
                    return this.simulateWriteToCard(student, data);
                }
            }

            // 模拟磁卡写入
            simulateWriteToCard(student, data) {
                try {
                    // 创建包含学员信息和积分数据的卡片数据
                    const cardData = this.prepareCardData(student, data);

                    // 将数据存储在localStorage中，模拟卡片数据
                    const cardStorageKey = `orangeHeart_card_${student.cardId}`;
                    localStorage.setItem(cardStorageKey, cardData);

                    console.log('模拟磁卡写入成功:', cardData);
                    return { success: true, message: '磁卡写入成功（模拟模式）' };
                } catch (error) {
                    console.error('模拟磁卡写入失败:', error);
                    return { success: false, message: '磁卡写入失败' };
                }
            }

            // 准备卡片数据
            prepareCardData(student, data) {
                const cardData = {
                    version: 1,
                    studentId: student.id,
                    cardId: student.cardId,
                    studentName: student.name,
                    points: student.points,
                    lastUpdated: new Date().toISOString(),
                    additionalData: data || {}
                };

                return JSON.stringify(cardData);
            }

            // 从磁卡读取数据
            async readFromCard(cardId) {
                try {
                    // 先尝试从localStorage读取模拟的卡片数据
                    const cardStorageKey = `orangeHeart_card_${cardId}`;
                    const cardData = localStorage.getItem(cardStorageKey);

                    if (cardData) {
                        console.log('从模拟存储中读取卡片数据:', cardData);
                        return JSON.parse(cardData);
                    }

                    // 如果没有模拟数据且支持WebUSB，尝试从实际设备读取
                    if (this.writeCardSupported) {
                        return await this.readFromPhysicalCard();
                    }

                    return null;
                } catch (error) {
                    console.error('读取卡片数据失败:', error);
                    return null;
                }
            }

            // 从物理卡片读取数据
            async readFromPhysicalCard() {
                try {
                    const device = await navigator.usb.requestDevice({
                        filters: [{
                            classCode: 0xFF,
                            subclassCode: 0x00,
                            protocolCode: 0x00
                        }]
                    });

                    await device.open();
                    await device.selectConfiguration(1);
                    await device.claimInterface(0);

                    // 读取数据
                    const result = await device.transferIn(1, 1024);
                    const cardData = new TextDecoder().decode(result.data);

                    await device.close();

                    return JSON.parse(cardData);
                } catch (error) {
                    console.error('读取物理卡片失败:', error);
                    return null;
                }
            }

            // 快速兑换积分
            useQuickPoints(reason) {
                if (!this.currentStudentId) {
                    this.showNotification('error', '操作失败', '请先刷卡识别学员');
                    return;
                }

                const student = this.students.find(s => s.id === this.currentStudentId);
                if (!student) return;
                const costPoints = Math.abs(Number(reason.points) || 0);
                if (costPoints <= 0) {
                    this.showNotification('error', '兑换失败', '兑换积分配置无效');
                    return;
                }

                // 检查积分是否足够
                if (student.points < costPoints) {
                    this.showNotification('error', '兑换失败', `${student.name} 的积分不足，当前${student.points}分，需要${costPoints}分`);
                    return;
                }

                // 创建积分记录
                const transaction = {
                    id: this.generateId(),
                    studentId: student.id,
                    type: 'use',
                    points: costPoints,
                    reason: reason.name,
                    date: new Date().toISOString()
                };

                this.transactions.push(transaction);

                const studentIndex = this.students.findIndex(s => s.id === student.id);
                if (studentIndex !== -1) {
                    this.students[studentIndex].points -= costPoints;
                }

                this.saveData();
                this.updateFrontDeskUI();
                this.showNotification('success', '兑换成功', `${student.name} 已兑换「${reason.name}」，扣除 ${costPoints} 积分！`);
                this.playSuccessAnimation();
            }

            // 快速发放积分
            giveQuickPoints(reason) {
                if (!this.currentStudentId) {
                    this.showNotification('error', '操作失败', '请先刷卡识别学员');
                    return;
                }

                const student = this.students.find(s => s.id === this.currentStudentId);
                if (!student) return;
                const delta = Number(reason.points) || 0;
                if (delta === 0) {
                    this.showNotification('warning', '操作取消', '该快捷项积分为 0，未做变更');
                    return;
                }
                const isDeduct = delta < 0;
                const absPoints = Math.abs(delta);

                // 创建积分记录
                const transaction = {
                    id: this.generateId(),
                    studentId: student.id,
                    type: isDeduct ? 'use' : 'earn',
                    points: absPoints,
                    reason: reason.name,
                    date: new Date().toISOString()
                };

                // 添加积分记录
                this.transactions.push(transaction);

                // 更新学员积分
                const studentIndex = this.students.findIndex(s => s.id === student.id);
                if (studentIndex !== -1) {
                    this.students[studentIndex].points += delta;
                }

                // 保存数据
                this.saveData();

                // 更新UI
                this.updateFrontDeskUI();

                // 显示成功消息
                if (isDeduct) {
                    this.showNotification('success', '积分扣减', `已为 ${student.name} 扣除 ${absPoints} 积分！`);
                } else {
                    this.showNotification('success', '积分奖励', `已成功奖励 ${student.name} ${absPoints} 积分！`);
                }

                // 播放成功动画
                this.playSuccessAnimation();
            }

            // 将学员信息写入磁卡
            async writeStudentToCard() {
                if (!this.currentStudentId) {
                    this.showNotification('error', '写入失败', '请先刷卡识别学员');
                    return;
                }

                const student = this.students.find(s => s.id === this.currentStudentId);
                if (!student) return;

                // 显示写入状态
                const checkInStatus = document.getElementById('checkInStatus');
                const writeCardButton = document.getElementById('writeCardButton');
                const checkInMessage = document.getElementById('checkInMessage');
                const checkInProgress = document.getElementById('checkInProgress');

                checkInStatus.classList.remove('hidden');
                writeCardButton.disabled = true;
                writeCardButton.classList.add('opacity-50', 'cursor-not-allowed');

                checkInMessage.textContent = '正在准备写入磁卡...';
                checkInProgress.textContent = '初始化系统';

                try {
                    // 准备写入数据
                    const writeData = {
                        type: 'studentInfo',
                        timestamp: new Date().toISOString(),
                        deviceId: this.getDeviceId(),
                        lastTransaction: this.transactions
                            .filter(t => t.studentId === student.id)
                            .sort((a, b) => new Date(b.date) - new Date(a.date))[0]
                    };

                    // 模拟写入过程
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    checkInMessage.textContent = '正在向磁卡写入数据...';
                    checkInProgress.textContent = '写入学员信息和积分数据';

                    // 模拟写入进度
                    let progress = 0;
                    const progressInterval = setInterval(() => {
                        progress += 10;
                        checkInProgress.textContent = `写入进度: ${progress}%`;

                        if (progress >= 100) {
                            clearInterval(progressInterval);

                            // 执行实际的磁卡写入
                            this.writeToCard(student, writeData).then(writeResult => {
                                if (writeResult.success) {
                                    checkInMessage.textContent = '正在验证写入结果...';
                                    checkInProgress.textContent = '读取磁卡数据进行验证';

                                    // 读取卡片数据进行验证
                                    setTimeout(() => {
                                        this.readFromCard(student.cardId).then(cardData => {
                                            if (cardData) {
                                                console.log('磁卡数据验证成功:', cardData);
                                                this.showNotification('success', '写入成功', `已成功将 ${student.name} 的信息和积分数据写入磁卡！`);
                                            } else {
                                                this.showNotification('warning', '验证提示', '写入完成，但无法验证数据。请重新刷卡确认。');
                                            }

                                            // 恢复按钮状态
                                            checkInStatus.classList.add('hidden');
                                            writeCardButton.disabled = false;
                                            writeCardButton.classList.remove('opacity-50', 'cursor-not-allowed');
                                        });
                                    }, 1000);
                                } else {
                                    // 写入失败
                                    this.showNotification('error', '写入失败', writeResult.message || '磁卡写入失败，请重试');

                                    // 恢复按钮状态
                                    checkInStatus.classList.add('hidden');
                                    writeCardButton.disabled = false;
                                    writeCardButton.classList.remove('opacity-50', 'cursor-not-allowed');
                                }
                            });
                        }
                    }, 200);
                } catch (error) {
                    console.error('写入过程出错:', error);
                    this.showNotification('error', '写入失败', '写入过程中出现错误，请重试');

                    // 恢复按钮状态
                    checkInStatus.classList.add('hidden');
                    writeCardButton.disabled = false;
                    writeCardButton.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            }

            // 更新积分记录列表
            updateTransactionList(studentId) {
                const transactionList = document.getElementById('transactionList');
                const transactions = this.transactions
                    .filter(t => t.studentId === studentId)
                    .sort((a, b) => new Date(b.date) - new Date(a.date))
                    .slice(0, 10);

                if (transactions.length === 0) {
                    transactionList.innerHTML = `
                        <div class="text-center text-gray-500 py-8">
                            <i class="fa fa-history text-4xl mb-2"></i>
                            <p>暂无积分记录</p>
                        </div>
                    `;
                    return;
                }

                transactionList.innerHTML = transactions.map(transaction => {
                    const date = new Date(transaction.date);
                    const formattedDate = `${date.getMonth() + 1}月${date.getDate()}日 ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;

                    const rawPoints = Number(transaction.points) || 0;
                    const signedPoints = transaction.type === 'use'
                        ? -Math.abs(rawPoints)
                        : rawPoints;
                    const pointsClass = signedPoints < 0 ? 'text-red-600' : 'text-green-600';
                    const pointsSign = signedPoints < 0 ? '-' : '+';

                    return `
                        <div class="flex justify-between items-center p-3 bg-white rounded-lg shadow-sm">
                            <div>
                                <div class="font-medium text-gray-800">${transaction.reason}</div>
                                <div class="text-sm text-gray-500">${formattedDate}</div>
                            </div>
                            <div class="font-bold ${pointsClass}">${pointsSign}${Math.abs(signedPoints)}</div>
                        </div>
                    `;
                }).join('');
            }

            // 筛选原因下拉框
            filterReasonSelect(selectId, keyword, type) {
                const select = document.getElementById(selectId);
                if (!select) return;

                const kw = (keyword || '').trim().toLowerCase();
                const list = Array.isArray(this.shortcuts[`${type}Reasons`]) ? this.shortcuts[`${type}Reasons`] : [];

                select.innerHTML = type === 'earn'
                    ? '<option value="">请选择获得原因</option>'
                    : '<option value="">请选择使用原因</option>';

                const filtered = kw ? list.filter(reason => reason.name.toLowerCase().includes(kw)) : list;
                filtered.forEach(reason => {
                    const points = Math.abs(Number(reason.points) || 0);
                    const option = document.createElement('option');
                    option.value = reason.name;
                    if (type === 'earn') {
                        const sign = (Number(reason.points) || 0) < 0 ? '-' : '+';
                        option.textContent = `${reason.name} (${sign}${points}分)`;
                    } else {
                        option.textContent = `${reason.name} (-${points}分)`;
                    }
                    select.appendChild(option);
                });
            }

            switchAdminTab(tabId) {
