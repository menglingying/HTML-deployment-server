            showAddStudentModal() {
                document.getElementById('addStudentModal').classList.remove('hidden');
                document.getElementById('newStudentName').focus();
            }

            // 隐藏添加学员模态框
            hideAddStudentModal() {
                document.getElementById('addStudentModal').classList.add('hidden');
                document.getElementById('newStudentName').value = '';
                document.getElementById('newStudentPhone').value = '';
                document.getElementById('newStudentCardId').value = '';
                document.getElementById('newStudentPoints').value = '0';
            }

            // 添加学员
            addStudent() {
                const name = document.getElementById('newStudentName').value.trim();
                const phone = document.getElementById('newStudentPhone').value.trim();
                const cardId = document.getElementById('newStudentCardId').value.trim();
                const points = parseInt(document.getElementById('newStudentPoints').value) || 0;

                if (!name || !phone) {
                    this.showNotification('error', '添加失败', '请填写完整的学员信息');
                    return;
                }

                if (!cardId) {
                    this.showNotification('error', '添加失败', '请刷卡或输入卡号');
                    return;
                }

                // 检查卡号是否已存在
                const existingStudent = this.students.find(s => s.cardId === cardId);
                if (existingStudent) {
                    this.showNotification('error', '添加失败', '该卡号已被使用');
                    return;
                }

                // 检查是否已经有磁卡标签映射
                const existingTag = Object.values(this.cardTags).find(tag => tag === cardId);
                if (existingTag) {
                    const originalCardId = Object.keys(this.cardTags).find(key => this.cardTags[key] === cardId);
                    this.showNotification('error', '添加失败', `此卡已映射到卡号 ${cardId}`);
                    return;
                }

                // 创建新学员
                const newStudent = {
                    id: this.generateId(),
                    name,
                    phone,
                    cardId: cardId,
                    points,
                    createdAt: new Date().toISOString()
                };

                // 添加到本地数据
                this.students.push(newStudent);

                // 如果是通过刷卡添加的学员，创建磁卡标签映射
                const cardIdInput = document.getElementById('newStudentCardId');
                if (cardIdInput && cardIdInput.value.trim() !== newStudent.cardId) {
                    const originalCardId = cardIdInput.value.trim();
                    this.cardTags[originalCardId] = newStudent.cardId;
                    console.log(`创建磁卡标签映射: ${originalCardId} -> ${newStudent.cardId}`);
                }

                // 保存到localStorage
                this.saveData();

                this.updateAdminUI();
                this.hideAddStudentModal();
                this.showNotification('success', '添加成功', `已添加学员 ${name}，并创建磁卡标签`);
            }

            // 显示编辑学员模态框
            showEditStudentModal(studentId) {
                const student = this.students.find(s => s.id === studentId);
                if (!student) return;

                document.getElementById('editStudentId').value = student.id;
                document.getElementById('editStudentName').value = student.name;
                document.getElementById('editStudentPhone').value = student.phone;
                document.getElementById('editStudentCardId').value = student.cardId;
                document.getElementById('editStudentPoints').value = student.points;

                document.getElementById('editStudentModal').classList.remove('hidden');
            }

            // 隐藏编辑学员模态框
            hideEditStudentModal() {
                document.getElementById('editStudentModal').classList.add('hidden');
            }

            // 更新学员信息
            updateStudent() {
                const id = document.getElementById('editStudentId').value;
                const name = document.getElementById('editStudentName').value.trim();
                const phone = document.getElementById('editStudentPhone').value.trim();
                const points = parseInt(document.getElementById('editStudentPoints').value) || 0;

                if (!name || !phone) {
                    this.showNotification('error', '更新失败', '请填写完整的学员信息');
                    return;
                }

                const studentIndex = this.students.findIndex(s => s.id === id);
                if (studentIndex === -1) return;

                const student = this.students[studentIndex];

                // 准备更新数据
                const updatedStudent = {
                    ...student,
                    name,
                    phone
                };

                // 如果积分有变化，添加积分记录
                const oldPoints = student.points;
                if (points !== oldPoints) {
                    const pointsDiff = points - oldPoints;
                    const transaction = {
                        id: this.generateId(),
                        studentId: id,
                        type: pointsDiff > 0 ? 'earn' : 'use',
                        points: Math.abs(pointsDiff),
                        reason: '管理员手动调整',
                        date: new Date().toISOString()
                    };

                    // 添加积分记录到本地
                    this.transactions.push(transaction);
                    updatedStudent.points = points;
                }

                // 更新本地学员数据
                this.students[studentIndex] = updatedStudent;

                // 保存到localStorage
                this.saveData();

                this.updateAdminUI();
                this.hideEditStudentModal();

                let message = `已更新学员 ${name} 的信息`;
                if (points !== oldPoints) {
                    message += `，积分从 ${oldPoints} 调整为 ${points}`;
                }

                this.showNotification('success', '更新成功', message);
            }

            // 显示删除确认模态框
            showDeleteConfirmModal(studentId) {
                this.deleteStudentId = studentId;
                document.getElementById('deleteConfirmModal').classList.remove('hidden');
            }

            // 隐藏删除确认模态框
            hideDeleteConfirmModal() {
                this.deleteStudentId = null;
                document.getElementById('deleteConfirmModal').classList.add('hidden');
            }

            // 删除学员
            deleteStudent() {
                if (!this.deleteStudentId) return;

                const studentIndex = this.students.findIndex(s => s.id === this.deleteStudentId);
                if (studentIndex === -1) return;

                const student = this.students[studentIndex];

                // 从本地数据中删除学员
                this.students.splice(studentIndex, 1);

                // 删除相关的积分记录
                this.transactions = this.transactions.filter(t => t.studentId !== this.deleteStudentId);

                // 删除相关的打卡记录
                this.checkInRecords = this.checkInRecords.filter(r => r.studentId !== this.deleteStudentId);

                // 删除相关的磁卡标签映射
                Object.keys(this.cardTags).forEach(key => {
                    if (this.cardTags[key] === student.cardId) {
                        delete this.cardTags[key];
                    }
                });

                // 保存到localStorage
                this.saveData();

                this.updateAdminUI();
                this.hideDeleteConfirmModal();
                this.showNotification('success', '删除成功', `已删除学员 ${student.name}`);

                // 如果当前显示的是被删除的学员，清除当前学员ID
                if (this.currentStudentId === this.deleteStudentId) {
                    this.currentStudentId = null;
                    document.getElementById('studentInfoArea').classList.add('hidden');
                }
            }

            // 发放积分
            earnPoints() {
                const studentId = document.getElementById('earnStudentSelect').value;
                const points = parseInt(document.getElementById('earnPointsAmount').value);
                const reason = document.getElementById('earnPointsReason').value;
                const date = document.getElementById('earnPointsDate').value;

                if (!studentId || !points || !reason || !date) {
                    this.showNotification('error', '操作失败', '请填写完整的积分发放信息');
                    return;
                }

                const student = this.students.find(s => s.id === studentId);
                if (!student) return;

                // 创建积分记录
                const transaction = {
                    id: this.generateId(),
                    studentId,
                    type: 'earn',
                    points,
                    reason,
                    date: new Date(date).toISOString()
                };

                // 添加积分记录
                this.transactions.push(transaction);

                // 更新学员积分
                const studentIndex = this.students.findIndex(s => s.id === studentId);
                if (studentIndex !== -1) {
                    this.students[studentIndex].points += points;
                }

                // 保存到localStorage
                this.saveData();

                // 清空表单
                document.getElementById('earnPointsAmount').value = '';
                document.getElementById('earnPointsReason').value = '';

                this.updateAdminUI();
                this.showNotification('success', '发放成功', `已为 ${student.name} 发放 ${points} 积分`);
            }

            // 使用积分
            usePoints() {
                const studentId = document.getElementById('useStudentSelect').value;
                const points = parseInt(document.getElementById('usePointsAmount').value);
                const reason = document.getElementById('usePointsReason').value;
                const date = document.getElementById('usePointsDate').value;

                if (!studentId || !points || !reason || !date) {
                    this.showNotification('error', '操作失败', '请填写完整的积分使用信息');
                    return;
                }

                const student = this.students.find(s => s.id === studentId);
                if (!student) return;

                // 检查积分是否足够
                if (student.points < points) {
                    this.showNotification('error', '操作失败', `${student.name} 的积分不足`);
                    return;
                }

                // 创建积分记录
                const transaction = {
                    id: this.generateId(),
                    studentId,
                    type: 'use',
                    points,
                    reason,
                    date: new Date(date).toISOString()
                };

                // 添加积分记录
                this.transactions.push(transaction);

                // 更新学员积分
                const studentIndex = this.students.findIndex(s => s.id === studentId);
                if (studentIndex !== -1) {
                    this.students[studentIndex].points -= points;
                }

                // 保存到localStorage
                this.saveData();

                // 清空表单
                document.getElementById('usePointsAmount').value = '';
                document.getElementById('usePointsReason').value = '';

                this.updateAdminUI();
                this.showNotification('success', '使用成功', `已为 ${student.name} 使用 ${points} 积分`);
            }

            // 显示添加原因表单
            showAddReasonForm(type) {
                this.hideEditReasonForm(type, false);
                document.getElementById(`add${type.charAt(0).toUpperCase() + type.slice(1)}ReasonForm`).classList.remove('hidden');
                document.getElementById(`new${type.charAt(0).toUpperCase() + type.slice(1)}Reason`).focus();
            }

            // 隐藏添加原因表单
            hideAddReasonForm(type) {
                document.getElementById(`add${type.charAt(0).toUpperCase() + type.slice(1)}ReasonForm`).classList.add('hidden');
                document.getElementById(`new${type.charAt(0).toUpperCase() + type.slice(1)}Reason`).value = '';
                document.getElementById(`new${type.charAt(0).toUpperCase() + type.slice(1)}Points`).value = type === 'earn' ? '10' : '5';
            }

            // 添加原因
            addReason(type) {
                const input = document.getElementById(`new${type.charAt(0).toUpperCase() + type.slice(1)}Reason`);
                const pointsInput = document.getElementById(`new${type.charAt(0).toUpperCase() + type.slice(1)}Points`);
                const reason = input.value.trim();
                const points = parseInt(pointsInput.value) || 1;

                if (!reason) {
                    this.showNotification('error', '添加失败', '请输入原因内容');
                    return;
                }

                if (type === 'earn' && (points < -100 || points > 100)) {
                    this.showNotification('error', '添加失败', '发放积分必须在-100到100之间');
                    return;
                }

                if (type === 'use' && (points < 1 || points > 100)) {
                    this.showNotification('error', '添加失败', '扣减积分必须在1到100之间');
                    return;
                }

                // 检查是否已存在
                if (this.shortcuts[`${type}Reasons`].some(r => r.name === reason)) {
                    this.showNotification('error', '添加失败', '该原因已存在');
                    return;
                }

                // 创建新的原因对象
                const newReason = {
                    id: this.generateId(),
                    name: reason,
                    points: points
                };

                // 创建更新后的快捷选项
                const updatedShortcuts = { ...this.shortcuts };
                updatedShortcuts[`${type}Reasons`] = [...updatedShortcuts[`${type}Reasons`], newReason];

                // 更新本地数据
                this.shortcuts = updatedShortcuts;

                // 保存到localStorage
                this.saveData();

                this.updateAdminUI();
                this.hideAddReasonForm(type);
                const displayPoints = Math.abs(points);
                const sign = type === 'use' || points < 0 ? '-' : '+';
                this.showNotification('success', '添加成功', `已添加新的原因选项：${reason} (${sign}${displayPoints}分)`);
            }

            // 编辑原因
            editReason(type, index) {
                const reason = this.shortcuts[`${type}Reasons`][index];
                if (!reason) return;

                // 显示编辑表单
                document.getElementById(`add${type.charAt(0).toUpperCase() + type.slice(1)}ReasonForm`).classList.add('hidden');
                document.getElementById(`edit${type.charAt(0).toUpperCase() + type.slice(1)}ReasonForm`).classList.remove('hidden');

                // 填充表单数据
                document.getElementById(`edit${type.charAt(0).toUpperCase() + type.slice(1)}Reason`).value = reason.name;
                document.getElementById(`edit${type.charAt(0).toUpperCase() + type.slice(1)}Points`).value = reason.points;

                // 保存当前编辑的索引
                this.currentEditIndex = index;
                this.currentEditType = type;
            }

            hideEditReasonForm(type, resetState = true) {
                const form = document.getElementById(`edit${type.charAt(0).toUpperCase() + type.slice(1)}ReasonForm`);
                if (form) {
                    form.classList.add('hidden');
                }

                if (resetState && this.currentEditType === type) {
                    this.currentEditIndex = null;
                    this.currentEditType = null;
                }
            }

            // 更新原因
            updateReason() {
                if (this.currentEditIndex === null || this.currentEditType === null) return;

                const type = this.currentEditType;
                const input = document.getElementById(`edit${type.charAt(0).toUpperCase() + type.slice(1)}Reason`);
                const pointsInput = document.getElementById(`edit${type.charAt(0).toUpperCase() + type.slice(1)}Points`);
                const reason = input.value.trim();
                const points = parseInt(pointsInput.value) || 0;

                if (!reason) {
                    this.showNotification('error', '更新失败', '请输入原因内容');
                    return;
                }

                if (type === 'earn' && (points < -100 || points > 100)) {
                    this.showNotification('error', '更新失败', '发放积分必须在-100到100之间');
                    return;
                }

                if (type === 'use' && (points < 1 || points > 100)) {
                    this.showNotification('error', '更新失败', '扣减积分必须在1到100之间');
                    return;
                }

                // 检查是否与其他原因重复
                const otherReasons = this.shortcuts[`${this.currentEditType}Reasons`].filter((_, i) => i !== this.currentEditIndex);
                if (otherReasons.some(r => r.name === reason)) {
                    this.showNotification('error', '更新失败', '该原因已存在');
                    return;
                }

                // 更新原因
                const updatedShortcuts = { ...this.shortcuts };
                updatedShortcuts[`${this.currentEditType}Reasons`][this.currentEditIndex] = {
                    ...updatedShortcuts[`${this.currentEditType}Reasons`][this.currentEditIndex],
                    name: reason,
                    points: points
                };

                this.shortcuts = updatedShortcuts;
                this.saveData();
                this.updateAdminUI();

                // 隐藏编辑表单
                this.hideEditReasonForm(type);

                const displayPoints = Math.abs(points);
                const sign = type === 'use' || points < 0 ? '-' : '+';
                this.showNotification('success', '更新成功', `已更新原因选项：${reason} (${sign}${displayPoints}分)`);
            }

            // 删除原因
            deleteReason(type, index) {
                // 创建更新后的快捷选项
                const updatedShortcuts = { ...this.shortcuts };
                updatedShortcuts[`${type}Reasons`] = updatedShortcuts[`${type}Reasons`].filter((_, i) => i !== index);

                // 更新本地数据
                this.shortcuts = updatedShortcuts;

                // 保存到localStorage
                this.saveData();

                this.updateAdminUI();
                this.showNotification('success', '删除成功', '已删除原因选项');
            }

            // 显示通知
            showNotification(type, title, message) {
                const notification = document.getElementById('notification');
                const icon = document.getElementById('notificationIcon');
                const titleElement = document.getElementById('notificationTitle');
                const messageElement = document.getElementById('notificationMessage');

                // 设置通知类型
                let iconClass = 'fa-info-circle';
                let borderClass = 'border-primary';

                switch (type) {
                    case 'success':
                        iconClass = 'fa-check-circle';
                        borderClass = 'border-green-500';
                        icon.className = `flex-shrink-0 text-green-500 mr-3`;
                        break;
                    case 'error':
                        iconClass = 'fa-exclamation-circle';
                        borderClass = 'border-red-500';
                        icon.className = `flex-shrink-0 text-red-500 mr-3`;
                        break;
                    case 'warning':
                        iconClass = 'fa-exclamation-triangle';
                        borderClass = 'border-yellow-500';
                        icon.className = `flex-shrink-0 text-yellow-500 mr-3`;
                        break;
                    default:
                        icon.className = `flex-shrink-0 text-primary mr-3`;
                }

                icon.innerHTML = `<i class="fa ${iconClass} text-xl"></i>`;
                notification.querySelector('.border-l-4').className = `border-l-4 ${borderClass}`;

                // 设置通知内容
                titleElement.textContent = title;
                messageElement.textContent = message;

                // 显示通知
                notification.classList.remove('translate-x-full');

                // 自动隐藏通知
                setTimeout(() => {
                    this.hideNotification();
                }, 5000);
            }

            // 隐藏通知
            hideNotification() {
                const notification = document.getElementById('notification');
                notification.classList.add('translate-x-full');
            }

            // 模拟刷卡
            simulateCardSwipe() {
                // 显示刷卡动画
                const cardSwipeArea = document.getElementById('cardSwipeArea');
                cardSwipeArea.classList.add('animate-swipe');

                setTimeout(() => {
                    cardSwipeArea.classList.remove('animate-swipe');

                    // 生成随机卡号或使用输入框中的卡号
                    const cardIdInput = document.getElementById('newStudentCardId');
                    let cardId;

                    if (cardIdInput && cardIdInput.value.trim()) {
                        cardId = cardIdInput.value.trim();
                    } else {
                        cardId = this.generateCardId();
                    }

                    this.processCardSwipe(cardId);
                }, 1000);
            }

            // 处理刷卡
            processCardSwipe(cardId) {
                console.log('检测到卡号:', cardId);

                // 检查是否有磁卡标签映射
                const mappedCardId = this.cardTags[cardId] || cardId;

                // 查找对应的学员
                const student = this.students.find(s => s.cardId === mappedCardId);

                if (student) {
                    // 找到学员，显示学员信息
                    this.currentStudentId = student.id;
                    this.updateFrontDeskUI();
                    this.showNotification('success', '识别成功', `欢迎回来，${student.name}！`);
                } else {
                    // 未找到学员，提示创建新学员
                    this.showNotification('warning', '未找到学员', '未找到该卡号对应的学员，请先添加学员信息');

                    // 如果在添加学员界面，自动填充卡号
                    const cardIdInput = document.getElementById('newStudentCardId');
                    if (cardIdInput) {
                        cardIdInput.value = cardId;
                    }
                }
            }

            // 连接USB刷卡器
            async connectUSBReader() {
                try {
                    const device = await navigator.usb.requestDevice({
                        filters: [{
                            classCode: 0xFF,
                            subclassCode: 0x00,
                            protocolCode: 0x00
                        }]
                    });

                    await device.open();
                    await device.selectConfiguration(1);
                    await device.claimInterface(0);

                    this.showNotification('success', '连接成功', 'USB刷卡器连接成功');
                    console.log('USB刷卡器连接成功:', device);

                    // 设置输入报告监听器
                    device.addEventListener('inputreport', (event) => {
                        const data = new Uint8Array(event.data.buffer);
                        const cardId = Array.from(data).map(byte => byte.toString(16).padStart(2, '0')).join('');
                        this.processCardSwipe(cardId);
                    });

                } catch (error) {
                    console.error('USB刷卡器连接失败:', error);
                    this.showNotification('error', '连接失败', '无法连接USB刷卡器，请检查设备连接');
                }
            }

            // 处理USB设备连接
            handleUSBConnect(event) {
                console.log('USB设备已连接:', event.device);
                this.showNotification('info', '设备连接', '检测到USB设备连接');
            }

            // 处理USB设备断开
            handleUSBDisconnect(event) {
                console.log('USB设备已断开:', event.device);
                this.showNotification('info', '设备断开', 'USB设备已断开连接');
            }

            // 初始化键盘仿真刷卡器
            initCardReader() {
                document.addEventListener('keydown', (e) => {
                    // 如果正在输入框中输入，不处理
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                        return;
                    }

                    // 忽略组合快捷键
                    if (e.ctrlKey || e.altKey || e.metaKey) {
                        return;
                    }

                    // 如果按下的是卡号字符
                    if (this.cardReader.allowedChars.test(e.key)) {
                        if (!this.cardReader.isReading) {
                            this.cardReader.isReading = true;
                            this.cardReader.cardData = '';
                            this.cardReader.startTime = Date.now();
                        }

                        this.cardReader.cardData += e.key;

                        // 刷卡器通常连续输出后停顿，这里用短超时自动收口
                        this.resetCardReadTimer();
                    } else if (this.cardReader.endKeys.includes(e.key)) {
                        // 一些刷卡器会在末尾发送回车或Tab
                        if (this.cardReader.isReading) {
                            this.clearCardReadTimer();
                            this.finishCardReading();
                            e.preventDefault();
                        }
                    } else if (this.cardReader.isReading) {
                        // 读取中遇到其他键，结束本次读取
                        this.clearCardReadTimer();
                        this.finishCardReading();
                    }
                });
            }

            resetCardReadTimer() {
                this.clearCardReadTimer();
                this.cardReader.readTimer = setTimeout(() => {
                    if (this.cardReader.isReading) {
                        this.finishCardReading();
                    }
                }, this.cardReader.readTimeout);
            }

            clearCardReadTimer() {
                if (this.cardReader.readTimer) {
                    clearTimeout(this.cardReader.readTimer);
                    this.cardReader.readTimer = null;
                }
            }

            // 完成卡号读取
            finishCardReading() {
                this.clearCardReadTimer();

                const rawCardData = (this.cardReader.cardData || '').trim();
                if (rawCardData.length >= this.cardReader.minLength) {
                    let cardId = rawCardData;

                    // 移除前缀和后缀
                    if (this.cardReader.prefix && cardId.startsWith(this.cardReader.prefix)) {
                        cardId = cardId.substring(this.cardReader.prefix.length);
                    }

                    if (this.cardReader.suffix && cardId.endsWith(this.cardReader.suffix)) {
                        cardId = cardId.substring(0, cardId.length - this.cardReader.suffix.length);
                    }

                    this.processCardSwipe(cardId);
                }

                // 重置读卡器状态
                this.cardReader.isReading = false;
                this.cardReader.cardData = '';
            }

            // 执行打卡操作
            async performCheckIn() {
                if (!this.currentStudentId) {
                    this.showNotification('error', '打卡失败', '请先刷卡识别学员');
                    return;
                }

                const student = this.students.find(s => s.id === this.currentStudentId);
                if (!student) return;

                // 显示打卡状态
                const checkInStatus = document.getElementById('checkInStatus');
                const checkInButton = document.getElementById('checkInButton');
                const checkInMessage = document.getElementById('checkInMessage');
                const checkInProgress = document.getElementById('checkInProgress');

                checkInStatus.classList.remove('hidden');
                checkInButton.disabled = true;
                checkInButton.classList.add('opacity-50', 'cursor-not-allowed');

                checkInMessage.textContent = '正在准备打卡...';
                checkInProgress.textContent = '初始化系统';

                try {
                    // 准备打卡数据
                    const checkInData = {
                        type: 'checkIn',
                        timestamp: new Date().toISOString(),
                        location: '前台',
                        deviceId: this.getDeviceId()
                    };

                    // 模拟打卡过程
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    checkInMessage.textContent = '正在向磁卡写入数据...';
                    checkInProgress.textContent = '写入学员信息';

                    // 模拟写入进度
                    let progress = 0;
                    const progressInterval = setInterval(() => {
                        progress += 10;
                        checkInProgress.textContent = `写入进度: ${progress}%`;

                        if (progress >= 100) {
                            clearInterval(progressInterval);

                            // 执行实际的磁卡写入
                            this.writeToCard(student, checkInData).then(writeResult => {
                                if (writeResult.success) {
                                    checkInMessage.textContent = '正在读取磁卡数据...';
                                    checkInProgress.textContent = '验证写入结果';

                                    // 读取卡片数据进行验证
                                    setTimeout(() => {
                                        this.readFromCard(student.cardId).then(cardData => {
                                            if (cardData) {
                                                console.log('磁卡数据验证成功:', cardData);
                                            }

                                            // 完成打卡
                                            this.completeCheckIn(student);

                                            // 恢复按钮状态
                                            checkInStatus.classList.add('hidden');
                                            checkInButton.disabled = false;
                                            checkInButton.classList.remove('opacity-50', 'cursor-not-allowed');
                                        });
                                    }, 1000);
                                } else {
                                    // 写入失败但仍完成打卡（降级处理）
                                    this.showNotification('warning', '写入提示', writeResult.message || '磁卡写入遇到问题，将使用系统记录');

                                    setTimeout(() => {
                                        this.completeCheckIn(student);

                                        // 恢复按钮状态
                                        checkInStatus.classList.add('hidden');
                                        checkInButton.disabled = false;
                                        checkInButton.classList.remove('opacity-50', 'cursor-not-allowed');
                                    }, 1000);
                                }
                            });
                        }
                    }, 200);
                } catch (error) {
                    console.error('打卡过程出错:', error);
                    this.showNotification('error', '打卡失败', '打卡过程中出现错误，请重试');

                    // 恢复按钮状态
                    checkInStatus.classList.add('hidden');
                    checkInButton.disabled = false;
                    checkInButton.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            }

            // 完成打卡
            completeCheckIn(student) {
                const now = new Date();
                const checkInTime = now.toISOString();
                const formattedDate = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日`;
                const formattedTime = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

                // 创建打卡记录
                const checkInRecord = {
                    id: this.generateId(),
                    studentId: student.id,
                    studentName: student.name,
                    cardId: student.cardId,
                    checkInTime: checkInTime,
                    formattedDate: formattedDate,
                    formattedTime: formattedTime,
                    pointsEarned: 1 // 打卡获得1积分
                };

                // 添加到打卡记录
                this.checkInRecords.unshift(checkInRecord);

                // 限制记录数量
                if (this.checkInRecords.length > 50) {
                    this.checkInRecords = this.checkInRecords.slice(0, 50);
                }

                // 增加积分
                const pointsDiff = 1;
                const transaction = {
                    id: this.generateId(),
                    studentId: student.id,
                    type: 'earn',
                    points: pointsDiff,
                    reason: '打卡签到奖励',
                    date: checkInTime
                };

                // 更新学员积分
                const studentIndex = this.students.findIndex(s => s.id === student.id);
                if (studentIndex !== -1) {
                    this.students[studentIndex].points += pointsDiff;
                }

                // 添加积分记录
                this.transactions.push(transaction);

                // 保存数据
                this.saveData();

                // 更新UI
                this.updateFrontDeskUI();
                this.updateCheckInRecords();

                // 显示成功消息
                this.showNotification('success', '打卡成功', `${student.name} 打卡成功，获得1积分！`);
            }

            // 生成唯一ID
            generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2);
            }

            // 生成卡号
            generateCardId() {
                return 'C' + Math.random().toString().substr(2, 8);
            }

            // 获取设备ID
            getDeviceId() {
                let deviceId = localStorage.getItem('orangeHeart_deviceId');
                if (!deviceId) {
                    deviceId = 'device_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('orangeHeart_deviceId', deviceId);
                }
                return deviceId;
            }
        }
    </script>
